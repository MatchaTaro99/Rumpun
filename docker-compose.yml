services:
  postgres:
    image: postgres:16-alpine
    container_name: rumpun-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rumpun}
      POSTGRES_USER: ${POSTGRES_USER:-rumpun}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rumpun_local_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-rumpun} -d ${POSTGRES_DB:-rumpun}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

